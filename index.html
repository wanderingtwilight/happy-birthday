<!DOCTYPE html>
<html>
<head>
<title>Birthday Game 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  text-align: center;
}

h1 {
  position: absolute;
  top: 10px;
  width: 100%;
  color: white;
  font-family:GARAMOND;
}

.heart {
  position: absolute;
  font-size: 100px;
  cursor: pointer;
}

/* 🎉 Final Screen */
#finalScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') no-repeat center center/cover;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* ✨ Text */
#message {
  font-size: 35px;
  color: pink;
  margin-bottom: 20px;
  animation: glow 1s infinite alternate;

}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 30px hotpink; }
}

/* 🎁 GIF */
#gif {
  width: 250px;
  border-radius: 20px;
}

.hero {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>
<div class="hero">
  <img src="vanshika.jfif" alt="image">
</div>
<audio id="bgmusic" loop>
 <source src="music.mp3" type="audio/mpeg">
</audio>

<h1 style="color: black;">Catch 18 Hearts Baby ❤️ | Score: <span id="score">0</span></h1>

<!-- 🎂 Final Screen -->
<div id="finalScreen">
  <div id="message">🎉 Happy Birthday Baby 💖 🎂</div>
  <img id="gif" src="gift.gif">
  <p style="font-size:xx-large; color: rgba(111, 238, 61, 0.993)"> you are the most memorable person in my life! <br>
  as well as the important person <br>
  love you bestie </p>
</div>

<script>
let musicStarted = false;
let score = 0;

function createHeart() {
  let heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = "0px";

  document.body.appendChild(heart);

  let fall = setInterval(() => {
    heart.style.top = heart.offsetTop + 5 + "px";

    if (heart.offsetTop > window.innerHeight) {
      heart.remove();
      clearInterval(fall);
    }
  }, 50);

  heart.onclick = function() {

  score++;
  document.getElementById("score").innerText = score;
  heart.remove();
  clearInterval(fall);

  // 🎵 FIRST HEART PE MUSIC START
  if(score == 1 && !musicStarted){
    document.getElementById("bgmusic").play();
    musicStarted = true;
  }

  // 🎉 Final screen
  if(score == 18){
    document.getElementById("finalScreen").style.display = "flex";
  }
}
}

setInterval(createHeart, 800);
</script>

</body>
</html>
